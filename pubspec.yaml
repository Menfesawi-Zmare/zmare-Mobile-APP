  package_info_plus: ^8.1.2
  cached_network_image: ^3.2.3
  audio_service: ^0.18.12
  just_audio: ^0.9.35
  on_audio_query: ^2.9.0
  share_plus: ^10.1.3
  flip_card: ^0.7.0
  marquee: ^2.2.3
  audiotagger: ^2.2.1
  palette_generator: ^0.3.3+3
  rxdart: ^0.27.7
  path_provider: ^2.1.1
  readmore: ^3.0.0
  logging: ^1.1.1
  file_picker: ^5.5.0 
  
  percent_indicator: ^4.2.3
  flutter_lyric: ^2.0.4+6
  sign_in_with_apple: ^6.1.4
  google_sign_in: ^6.0.2
  firebase_auth: ^5.3.4 
  firebase_core: ^3.9.0
  firebase_storage: ^12.3.7

 
  pretty_dio_logger: ^1.2.0-beta-1
  logger: ^2.5.0
  image_cropper: ^5.0.0
  infinite_scroll_pagination: ^4.1.0
  fluentui_system_icons: ^1.1.199
  dartz: ^0.10.1
  flutter_screenutil: ^5.7.0
  metadata_god: ^0.5.2
  font_awesome_flutter: ^10.5.0
  google_mobile_ads: ^3.0.0
  http_parser: ^4.0.2
  connectivity_plus: ^6.1.1
  firebase_crashlytics: ^4.2.0
  glassmorphism: ^3.0.0
  video_player: ^2.9.2
  chewie: ^1.9.0
  flutter_svg: ^2.0.17
  rive_animated_icon: ^2.0.3
  gif: ^2.3.0
  smooth_page_indicator: ^1.2.1
  flutter_animate: ^4.5.2
  
  


  
  
dev_dependencies:
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  change_app_package_name: any
  flutter_launcher_icons: ^0.14.2
flutter_launcher_icons:

  image_path: "assets/icon/splash-logo.png"
  android: true 
  ios: true 
  adaptive_icon_foreground: "assets/icon/splash-logo.png"
  adaptive_icon_background: "#FFFFFF"  
  adaptive_icon_background_dark: "#889AC7" 
  adaptive_icon_foreground_inset: 16 
  adaptive_icon_monochrome: "assets/icon/splash-logo.png"
  min_sdk_android: 21
  android_icon_size: 60  
  ios_icon_size: 180
  remove_alpha_ios: true


flutter_native_splash:
  
  android: true
  ios: true
  web: false
  color: "#1C292C"
  image: assets/images/logo.png
  branding: assets/images/branding.png

  android_12:
    color: "#1C292C"
    image: assets/images/logo2.png
    branding: assets/images/branding.png



flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/images/

  fonts:
    - family: Hidase
      fonts:
        - asset: assets/fonts/Bela Hidase-Bold.ttf
          weight: 800
        - asset: assets/fonts/Bela Hidase-ExtraBold.ttf
          weight: 900
        - asset: assets/fonts/Bela Hidase-Regular.ttf 
    - family: Washera
      fonts:
        - asset: assets/fonts/washrab.ttf
         

    